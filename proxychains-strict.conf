# ProxyChains - 3 independent Tor circuits
# strict_chain = fails closed if any circuit is dead (no IP leak)
# Each Tor instance = 3 internal hops (guard -> relay -> exit)
# So you get 3 DIFFERENT exit IPs rotating across connections
# Health monitor alerts instantly if any circuit drops

strict_chain

# Suppress chain info from stderr
quiet_mode
proxy_dns

tcp_read_time_out 10000
tcp_connect_time_out 5000
remote_dns_subnet 224

[ProxyList]
# 3 independent Tor circuits - each builds separate 3-hop path
socks5 127.0.0.1 9050
socks5 127.0.0.1 9052
socks5 127.0.0.1 9054
