name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          # Guard against the silent no-op where a tag is placed on a commit
          # whose pyproject version wasn't bumped: build would produce the old
          # version, PyPI already has it, and skip-existing reports success while
          # uploading nothing. Fail loudly instead.
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          echo "tag=$TAG  pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match pyproject version $PKG — refusing to publish a mislabeled build"
            exit 1
          fi

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # A re-run on an already-published version (e.g. a moved tag) should
          # skip, not hard-fail — PyPI versions are immutable.
          skip-existing: true
